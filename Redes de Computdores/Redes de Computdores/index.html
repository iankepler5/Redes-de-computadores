<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap"
        rel="stylesheet">

    <title>Modelo OSI</title>
</head>

<body>

    <header class="main-header">

        <img
            src="./imagem/modelo_osi.png"
            alt="Modelo OSI"
            class="header-photo">

        <div class="header-info">

            <p class="title">
                Projeto de Redes - Modelo OSI
            </p>

            <p class="user"></p>

        </div>

    </header>

    <main class="content-body">

        <div class="request-wrapper">

            <input
                type="text"
                placeholder="Digite algo aqui..."
                class="text-input input-field">

            <button
                type="submit"
                class="request-btn">

                Realizar Requisição

            </button>

            <div class="upload-section">

                <label for="arquivo">
                    Selecione um arquivo:
                </label>

                <input
                    type="file"
                    id="arquivo">

            </div>

        </div>

        <div class="protocol-response-wrapper">

            <h1 class="protocol-response"></h1>

        </div>


        <form class="email-form hidden">

            <h2 class="form-title">
                Simulador de Envio (SMTP)
            </h2>

            <div class="form-group">

                <label for="remetente">
                    Remetente:
                </label>

                <input
                    type="email"
                    id="remetente"
                    class="input-field"
                    placeholder="exemplo@email.com"
                    required>

            </div>

            <div class="form-group">

                <label for="destinatario">
                    Destinatário:
                </label>

                <input
                    type="email"
                    id="destinatario"
                    class="input-field"
                    placeholder="destino@email.com"
                    required>

            </div>

            <div class="form-group">

                <label for="assunto">
                    Assunto:
                </label>

                <input
                    type="text"
                    id="assunto"
                    class="input-field"
                    placeholder="Assunto do e-mail"
                    required>

            </div>

            <div class="form-group">

                <label for="corpo">
                    Corpo da Mensagem:
                </label>

                <textarea
                    id="corpo"
                    class="input-field textarea-field"
                    placeholder="Digite sua mensagem..."
                    required>
                </textarea>

            </div>

            <div class="form-group">

                <label for="protocolo">
                    Protocolo:
                </label>

                <input
                    type="text"
                    id="protocolo"
                    class="input-field"
                    value="SMTP"
                    readonly>

            </div>

            <button
                type="submit"
                class="request-btn">

                Enviar E-mail

            </button>

        </form>

    </main>

    <!-- JS -->
    <script src="scripts/apresentacao.js"></script>
    <script src="scripts/application.js"></script>

</body>

</html>
